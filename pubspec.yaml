name: sonus
description: "A new Flutter project."

publish_to: 'none' #

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_svg: ^2.2.4
  cupertino_icons: ^1.0.8
  audio_video_progress_bar: ^2.0.3
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/svg/


