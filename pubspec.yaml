name: sonus
description: "A new Flutter project."

publish_to: 'none' #

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  audiotags: ^1.4.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_svg: ^2.2.4
  cupertino_icons: ^1.0.8
  audio_video_progress_bar: ^2.0.3
  rxdart: ^0.28.0
  on_audio_query: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/svg/


  fonts:
    - family: RopaSans
      fonts:
        - asset: assets/fonts/RopaSans-Regular.ttf

dependency_overrides:
  on_audio_query_android:
    git:
      url: https://github.com/LucJosin/on_audio_query.git
      path: packages/on_audio_query_android


flutter_launcher_icons:
  # General fallback (used for iOS)
  # This should be your logo on a SOLID blue background (No transparency!)
  image_path: "assets/icon_ios_blue_background.png" 

  ios: true
  remove_alpha_ios: true # Ensures Apple won't reject it

  android: true
  # Android specific "Adaptive" setup
  adaptive_icon_background: "#2D3157" # Replace with your exact Blue Hex
  adaptive_icon_foreground: "assets/icon/logo_transparent.png"